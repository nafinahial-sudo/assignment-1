<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Conference</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .navbar {
        width: 100%;
        height: 80px;
        display: flex;
        align-items: center;
        padding: 0 80px;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .navbar a {
        text-decoration: none;
        color: black;
        font-size: 16px;
        font-weight: 500;
      }
      .navbar a:hover {
        color: blue;
      }
      .logo img {
        width: 120px;
      }
      .logo {
        flex: 1;
      }
      .center-menu {
        flex: 2;
        display: flex;
        justify-content: center;
        gap: 35px;
      }
      .register-btn {
        background: blue;
        color: white !important;
        text-decoration: none;
        padding: 12px 25px;
        border-radius: 8px;
        display: inline-block;
      }
      .btn {
        flex: 1;
        display: flex;
        justify-content: flex-end;
      }
      .hero {
        width: 100%;
        height: 600px;
        background-image: url("assets/banner.jpg");
        background-size: cover;
        background-position: center;
      }

      .overlay {
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        text-align: center;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hero h1 {
        font-size: 60px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .hero p {
        width: 700px;
        font-size: 18px;
        line-height: 30px;
        margin-bottom: 30px;
      }

      .hero-btn {
        background-color: blue;
        color: white;
        text-decoration: none;
        padding: 12px 25px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img src="assets/logo.png" alt="LOGO" />
      </div>
      <div class="center-menu">
        <a href="speakers.html">Speakers</a>
        <a href="schedule.html">Schedule</a>
        <a href="tracks.html">Tracks</a>
        <a href="venue.html">Venue</a>
        <a href="blog.html">Blog</a>
      </div>
      <div class="btn">
        <a href="reg-form.html" class="register-btn">Register Now</a>
      </div>
    </nav>

    <section class="hero">
      <div class="overlay">
        <h1>Code. <i>Connect.</i> Create.</h1>

        <p>
          Join 4,000+ engineers, founders, and builders at the premier developer
          conference of 2026. Three days of cutting-edge talks, hands-on
          workshops, and meaningful connections.
        </p>

        <a href="reg-form.html" class="hero-btn">Register Now</a>
      </div>
    </section>
  </body>
</html>
