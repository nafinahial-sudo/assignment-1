<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakers</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .navbar {
        width: 100%;
        height: 80px;
        display: flex;
        align-items: center;
        padding: 0 80px;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .navbar a {
        text-decoration: none;
        color: black;
        font-size: 16px;
        font-weight: 500;
      }
      .navbar a:hover {
        color: blue;
      }
      .logo img {
        width: 120px;
      }
      .logo {
        flex: 1;
      }
      .center-menu {
        flex: 2;
        display: flex;
        justify-content: center;
        gap: 35px;
      }
      .register-btn {
        background: blue;
        color: white !important;
        text-decoration: none;
        padding: 12px 25px;
        border-radius: 8px;
        display: inline-block;
      }
      .btn {
        flex: 1;
        display: flex;
        justify-content: flex-end;
      }
      .speakers {
        width: 100%;
        text-align: left;
        margin-top: 40px;
        margin-bottom: 40px;
      }

      .speakers h2 {
        text-align: center;
        font-size: 35px;
        margin-bottom: 40px;
      }

      .speaker-container {
        display: grid;
        grid-template-columns: repeat(2, 320px);
        justify-content: center;
        gap: 30px;
      }

      .card {
        border: 1px solid lightgray;
        border-radius: 10px;
        padding: 5px;
        background-color: white;
      }

      .card img {
        width: 100%;
        border-radius: 5px;
      }

      .card h4 {
        color: blue;
        margin-top: 15px;
        margin-bottom: 10px;
      }

      .card h3 {
        margin-bottom: 10px;
      }

      .card p {
        color: gray;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img src="assets/logo.png" alt="LOGO" />
      </div>
      <div class="center-menu">
        <a href="speakers.html">Speakers</a>
        <a href="schedule.html">Schedule</a>
        <a href="tracks.html">Tracks</a>
        <a href="venue.html">Venue</a>
        <a href="blog.html">Blog</a>
      </div>
      <div class="btn">
        <a href="reg-form.html" class="register-btn">Register Now</a>
      </div>
    </nav>
    <section class="speakers">
      <h2>Meet the Speakers</h2>

      <div class="speaker-container">
        <div class="card">
          <img src="assets/andrej.png" alt="Andrej Karpathy" />

          <h4>AI/ML</h4>

          <h3>Andrej Karpathy</h3>

          <p>Former Director of AI, Tesla</p>
        </div>

        <div class="card">
          <img src="assets/demis.png" alt="Demis Hassabis" />

          <h4>Cloud & DevOps</h4>

          <h3>Demis Hassabis</h3>

          <p>CEO, Google DeepMind</p>
        </div>

        <div class="card">
          <img src="assets/gary.png" alt="Gary Simon" />

          <h4>Frontend</h4>

          <h3>Gary Simon</h3>

          <p>Founder, DesignCourse</p>
        </div>

        <div class="card">
          <img src="assets/mustafa.png" alt="Mustafa Suleyman" />

          <h4>Security</h4>

          <h3>Mustafa Suleyman</h3>

          <p>CEO, Microsoft AI</p>
        </div>
      </div>
    </section>
  </body>
</html>
